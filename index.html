  <link rel="stylesheet" href="/index.css">

<body>
  <div class="mesh-bg"></div>
  <style>
    .ffn-initial-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .ffn-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
  <div id="root">
    <div class="ffn-initial-loader">
      <div class="ffn-spinner"></div>
    </div>
  </div>
  <script type="module" src="/index.tsx"></script>
</body>
