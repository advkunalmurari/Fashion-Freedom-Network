  <!-- Critical resource hints -->
  <link rel="preconnect" href="https://lwhtzpvfcvimwrplduyf.supabase.co">
  <link rel="dns-prefetch" href="https://lwhtzpvfcvimwrplduyf.supabase.co">
  <link rel="preconnect" href="https://images.unsplash.com">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap"

    media="print"
    onload="this.media='all'"

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap"
      rel="stylesheet"
    >
  </noscript>

  <!-- Inline critical CSS: only what is needed before JS loads -->
  <style>
    *,::before,::after{box-sizing:border-box}
    html{line-height:1.5;-webkit-text-size-adjust:100%}
    html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
    body{margin:0;background:#0a0a0a;color:#fff;-webkit-font-smoothing:antialiased;font-family:Inter,system-ui,sans-serif;overflow-x:hidden}
    #root{min-height:100vh}
    .ffn-initial-loader{position:fixed;inset:0;background:#0a0a0a;display:flex;justify-content:center;align-items:center;z-index:9999}
    .ffn-spinner{width:36px;height:36px;border:2px solid rgba(255,255,255,.12);border-top-color:#fff;border-radius:50%;animation:_spin .8s linear infinite}
    @keyframes _spin{to{transform:rotate(360deg)}}
  </style>

<body>
  <div class="mesh-bg"></div>
  <div id="root">
    <div class="ffn-initial-loader">
      <div class="ffn-spinner"></div>
    </div>
  </div>
  <script type="module" src="/index.tsx"></script>
</body>
